# Configura��o do Banco de Dados PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/searchjobs_db
spring.datasource.username=postgres
spring.datasource.password=12334
spring.datasource.driver-class-name=org.postgresql.Driver

# Configura��o do Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=none

# Executa schema.sql antes do Hibernate inicializar (funciona em bancos não-embarcados)
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=searchjobs-secret-key-must-be-at-least-32-chars-long!
jwt.expiration=86400000

# Upload de arquivos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.base-url=http://localhost:8080